<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >
    <script>
      (() => {
        const themeStorageKey = 'preferred-markdown-stream-playground-theme'
        let theme = 'dark'

        try {
          const storedTheme = globalThis.localStorage.getItem(themeStorageKey)
          if (storedTheme === 'light' || storedTheme === 'dark') {
            theme = storedTheme
          }
          else {
            globalThis.localStorage.setItem(themeStorageKey, theme)
          }
        }
        catch {}

        const root = document.documentElement
        root.dataset.theme = theme
        root.style.colorScheme = theme

        if (theme === 'dark') {
          root.style.backgroundColor = '#0a0a0b'

          const blockingStyle = document.createElement('style')
          blockingStyle.textContent = `
            html, body, #app {
              margin: 0;
              min-height: 100dvh;
              background: #0a0a0b;
              color: #e8e6e3;
            }
          `
          document.head.append(blockingStyle)
        }
      })()
    </script>
    <title>preferred-markdown-stream playground</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
